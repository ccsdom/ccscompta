# The name of your backend, which will be used in the backend's URL
backendId: ccs-compta-backend
# The region to deploy your backend
location: us-central1

# A list of environment variables that will be available to your backend
# (e.g. process.env.API_KEY)
# You can also use managed secrets for sensitive environment variables
# (e.g. secret: MY_SECRET)
env:
  - variable: 'NODE_ENV'
    value: 'production'

# Specifies the entrypoint for your backend
run:
  # The command to start your backend
  command: npm run start
  # The number of CPUs to allocate to your backend
  cpu: 1
  # The amount of memory to allocate to your backend
  memoryMiB: 512
  # The maximum number of concurrent requests to your backend
  concurrency: 80

# A list of secrets that will be available to your backend as environment variables
# You can create secrets using the gcloud CLI
# (e.g. `gcloud secrets versions add MY_SECRET --data-from-file=my-secret.txt`)
managedSecrets:
  - secret: FIREBASE_CLIENT_EMAIL
  - secret: FIREBASE_PRIVATE_KEY
  - secret: INSEE_API_KEY
